.b-fe{background:var(--color-background-info);color:var(--color-text-info)}
.b-be{background:var(--color-background-success);color:var(--color-text-success)}
.b-shared{background:var(--color-background-warning);color:var(--color-text-warning)}
.b-new{background:var(--color-background-danger);color:var(--color-text-danger)}
.tip{margin:4px 16px 8px 16px;padding:10px 14px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);border:1px solid var(--color-border-tertiary);font-family:var(--font-sans);font-size:13px;color:var(--color-text-secondary);display:none}
.tip.show{display:block}
.tip strong{font-weight:500;color:var(--color-text-primary)}
.tip .new-tag{display:inline-block;font-size:11px;padding:1px 7px;border-radius:10px;background:var(--color-background-danger);color:var(--color-text-danger);margin-left:6px;vertical-align:middle}
.legend{display:flex;gap:12px;padding:0 16px 14px;flex-wrap:wrap;align-items:center}
.litem{display:flex;align-items:center;gap:6px;font-family:var(--font-sans);font-size:12px;color:var(--color-text-secondary)}
</style>

function computeIsLast(items) {
  return items.map((item, i) => {
    const next = items.slice(i+1).find(x => x.d <= item.d);
    return !next || next.d < item.d;
  });
}

const isLast = computeIsLast(items);

function getPrefix(i, items, isLast) {
  const depth = items[i].d;
  if (depth === 0) return '';
  let pre = '';
  for (let k = 1; k <= depth; k++) {
    if (k === depth) {
      pre += isLast[i] ? '└── ' : '├── ';
    } else {
      // check if ancestor at level k has more siblings after i
      let hasMore = false;
      for (let j = i+1; j < items.length; j++) {
        if (items[j].d < k) break;
        if (items[j].d === k) { hasMore = true; break; }
      }
      pre += hasMore ? '│   ' : '    ';
    }
  }
  return pre;
}

const tree = document.getElementById('tree');
const tip = document.getElementById('tip');
let active = -1;

items.forEach((item, i) => {
  const row = document.createElement('div');
  row.className = 'node';
  row.style.padding = '1px 16px';

  const prefix = document.createElement('span');
  prefix.className = 'prefix';
  prefix.textContent = getPrefix(i, items, isLast);

  const label = document.createElement('span');
  label.className = 'label' + (item.type==='root'?' root':item.type==='dir'?' dir':'');
  label.textContent = item.name;

  row.appendChild(prefix);
  row.appendChild(label);

  if (item.badge) {
    const badge = document.createElement('span');
    badge.className = 'badge ' + item.badge;
    badge.textContent = item.badge==='b-fe'?'frontend':item.badge==='b-be'?'backend':'shared';
    row.appendChild(badge);
  }
  if (item.isNew) {
    const nb = document.createElement('span');
    nb.className = 'badge b-new';
    nb.textContent = '+ mới';
    row.appendChild(nb);
  }

  row.onclick = () => {
    if (active === i) { tip.classList.remove('show'); active = -1; return; }
    const newTag = item.isNew ? '<span class="new-tag">+ mới</span>' : '';
    tip.innerHTML = '<strong>' + item.name + '</strong>' + newTag + ' — ' + item.info;
    tip.classList.add('show');
    active = i;
    row.insertAdjacentElement('afterend', tip);
  };

  tree.appendChild(row);
});
</script>
